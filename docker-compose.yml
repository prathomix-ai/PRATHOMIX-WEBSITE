version: '3.9'

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prathomix-api
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - prathomix

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prathomix-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - prathomix

networks:
  prathomix:
    driver: bridge
